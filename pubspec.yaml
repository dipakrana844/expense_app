name: smart_expense_tracker
description: A production-ready offline-first expense tracking app with clean architecture
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # State Management - Riverpod 3.x for reactive state management
  # flutter_riverpod: ^2.6.1
  # riverpod_annotation: ^2.6.1

  # Immutability - Freezed for data classes with immutability
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # Local Storage - Hive for fast, offline-first persistence
  hive_flutter: ^1.1.0
  # hive: ^2.2.3

  # Connectivity - Monitor network status
  connectivity_plus: ^7.1.1

  # UUID Generation - Unique identifiers for expenses
  uuid: ^4.5.1

  # UI Utilities
  intl: ^0.20.2  # Date formatting and number formatting
  flutter_slidable: ^4.0.3  # Swipe-to-delete/edit functionality
  go_router: ^17.0.1
  fl_chart: ^1.1.1
  workmanager: ^0.9.0+3
  path_provider: ^2.1.5
  local_auth: ^3.0.0
  share_plus: ^13.1.0
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  google_mlkit_text_recognition: ^0.15.0
  image_picker: ^1.2.1
  collection: ^1.19.1
  flutter_riverpod: ^3.3.1
  # flutter_riverpod: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.14.0
  json_serializable: ^6.10.0
  freezed: ^3.1.0
  # Code Generation

flutter:
  uses-material-design: true
